name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check QA matrix docs
        run: npm run qa:matrix:check

      - name: Check commit message accuracy
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run commit:check:range -- "${{ github.event.pull_request.base.sha }}..HEAD"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            npm run commit:check:range -- "${{ github.event.before }}..HEAD"
          else
            npm run commit:check
          fi

      - name: Typecheck app
        run: npm run typecheck -- --pretty false

      - name: Typecheck Convex
        run: npx tsc --noEmit --project convex/tsconfig.json --pretty false

      - name: Test
        run: npm test

      - name: Ladder eval
        run: npm run ladder

      - name: Build
        run: npm run build
