name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check QA matrix docs
        run: npm run qa:matrix:check

      - name: Check commit message accuracy
        run: npm run commit:check

      - name: Typecheck app
        run: npm run typecheck -- --pretty false

      - name: Typecheck Convex
        run: npx tsc --noEmit --project convex/tsconfig.json --pretty false

      - name: Test
        run: npm test

      - name: Ladder eval
        run: npm run ladder

      - name: Build
        run: npm run build
