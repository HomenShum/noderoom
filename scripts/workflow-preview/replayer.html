<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  /* --mut lifted #8B8178 -> #A89E92 -> #BCB3A7 across gemini-judge rounds flagging label/version
     contrast on dark bg (recurring on l1/l3/l4; now ~7:1 at 11.5px mono). */
  :root { --bg:#151413; --panel:#1c1a18; --edge:rgba(255,255,255,.08); --ink:#ECE7E0; --mut:#BCB3A7; --acc:#d97757; --ok:#3FB37F; --bad:#E0564E; --lock:#E0A14E; }
  * { box-sizing:border-box; margin:0; }
  html,body { background:var(--bg); }
  #stage { width:760px; height:420px; background:var(--bg); color:var(--ink);
    font-family:'Manrope',ui-sans-serif,system-ui,sans-serif; padding:26px 30px; position:relative; overflow:hidden; }
  .top { display:flex; align-items:baseline; justify-content:space-between; }
  .ttl { font-size:21px; font-weight:800; letter-spacing:-.01em; }
  .badge { font-size:10px; text-transform:uppercase; letter-spacing:.18em; color:var(--acc); font-weight:700; }
  .sub { color:var(--mut); font-size:12px; margin-top:3px; }
  .sheet { margin-top:20px; border:1px solid var(--edge); border-radius:12px; overflow:hidden; background:var(--panel); }
  .row { display:grid; grid-template-columns:170px 1fr 96px; align-items:center; height:42px; border-bottom:1px solid var(--edge);
    font-size:13px; transition:background .2s, box-shadow .2s; }
  .row:last-child { border-bottom:none; }
  .row .lab { padding:0 14px; color:var(--mut); font-family:ui-monospace,'JetBrains Mono',monospace; font-size:11.5px; }
  .row .val { padding:0 14px; font-family:ui-monospace,'JetBrains Mono',monospace; font-weight:700; transition:color .2s; }
  .row .tag { padding:0 14px; text-align:right; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--mut); white-space:nowrap; }
  .row.active { background:rgba(217,119,87,.10); box-shadow:inset 3px 0 0 var(--acc); }
  .row.locked .tag { color:var(--lock); }
  .row.locked { box-shadow:inset 3px 0 0 var(--lock); background:rgba(224,161,78,.08); }
  /* Conflict tint tuned across judge rounds: .14 read as "hard to distinguish", .30 as "harsh,
     saturated" — .19 with a soft single-edge accent is the midpoint that stays on-palette. */
  .row.conflict { background:rgba(224,86,78,.19); box-shadow:inset 3px 0 0 var(--bad); }
  .row.conflict .val { color:#f4a59d; font-weight:700; }
  .row.conflict .tag { color:#f8d8d4; font-weight:700; padding-right:18px; }
  .row.draft { background:rgba(228,197,103,.14); box-shadow:inset 3px 0 0 #e4c567; }
  .row.draft .val { color:#f0d986; }
  .row.draft .tag { color:#f0d986; }
  /* Dense mode: 7+ rows (e.g. 6 model cells + the off-screen summary row) must fit the fixed
     420px stage without colliding with the ticker (gemini judge: "severe text collision"). */
  .sheet.dense .row { height:33px; }
  .sheet.dense .lab { font-size:10.5px; }
  .sheet.dense .val { font-size:11px; }
  .sheet.dense .tag { font-size:9px; }
  .row.committed .val { color:var(--ok); }
  .ticker { position:absolute; left:30px; right:30px; bottom:24px; display:flex; align-items:center; gap:12px; }
  .who { width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-weight:800; font-size:13px; flex:none;
    background:linear-gradient(135deg,var(--acc),#b9532f); color:#160d08; }
  .act { font-size:13px; color:var(--ink); }
  .act b { color:var(--acc); }
  .step { position:absolute; right:30px; bottom:27px; font-size:10px; color:var(--mut); font-family:ui-monospace,monospace; letter-spacing:.08em; }
  .dots { position:absolute; left:30px; bottom:7px; display:flex; gap:5px; }
  .dot { width:14px; height:3px; border-radius:2px; background:var(--edge); }
  .dot.on { background:var(--acc); }
</style>
</head>
<body>
<div id="stage">
  <div class="top"><div class="ttl" id="ttl"></div><div class="badge" id="badge"></div></div>
  <div class="sub" id="sub"></div>
  <div class="sheet" id="sheet"></div>
  <div class="ticker"><div class="who">AI</div><div class="act" id="act"></div></div>
  <div class="step" id="stepn"></div>
  <div class="dots" id="dots"></div>
</div>
<script>
const WF = window.__WF__ || { title:"Workflow", badge:"", subtitle:"", cells:[], trace:[] };
const cells = WF.cells.map(c => ({ ...c, value: c.value ?? "", version: c.version ?? 1, state:"" }));
const byId = Object.fromEntries(cells.map(c => [c.id, c]));
// When the trace writes cells the table doesn't show (a 16-cell model vs 6 visible rows), add ONE
// summary row that visibly ticks per off-screen commit — otherwise those frames are a static
// panel under a status bar claiming work happened, which reads as dishonest (gemini judge).
const offIds = new Set();
for (const ev of WF.trace) {
  if ((ev.tool === 'edit_cell' || ev.tool === 'write_cell_result') && ev.result && ev.result.ok) {
    const id = ev.args && ev.args.elementId;
    if (id && !byId[id]) offIds.add(id);
  }
}
let rest = null;
if (offIds.size) { rest = { id:'__rest', label:'… +' + offIds.size + ' more model cells', value:'', version:0, state:'' }; cells.push(rest); byId['__rest'] = rest; }
// Each frame is the state AFTER applying step i (frame 0 = initial). `hold` (ms) overrides the
// default per-frame delay for moments that need reading time (conflicts, denials, asides).
const frames = [];
function snap(act, hold) { frames.push({ cells: cells.map(c => ({ ...c })), act, hold }); }
// Footer references use the human LABEL when the cell is visible (raw ids like r_ni__variance are
// developer-speak), and ALWAYS name the write target — an unnamed "writes =F7*(...)" next to a
// visible F7 cell holding a different formula reads as a lie (gemini judge finding, 2026-06-11).
const labelOf = id => (byId[id] && byId[id].label) ? byId[id].label : id;
// Find the value the agent later observes for `id` (first subsequent read_range row) — used to
// render the human's conflicting commit with its REAL value rather than inventing one.
function lookAheadValue(from, id) {
  for (let k = from; k < WF.trace.length; k++) {
    const e = WF.trace[k];
    if (e.tool !== 'read_range' || !Array.isArray(e.result)) continue;
    const row = e.result.find(r => r.id === id);
    if (row && row.value !== '' && row.value != null) return { value: row.value };
  }
  return null;
}
let released = false, wroteAny = false, deniedLocks = 0, afterConflict = false;
snap('<b>Goal</b> ' + (WF.subtitle || ''));
for (let ti = 0; ti < WF.trace.length; ti++) {
  const ev = WF.trace[ti];
  const tool = ev.tool;
  const ids = (ev.args && ev.args.elementIds) || (ev.args && ev.args.elementId ? [ev.args.elementId] : []);
  const res = ev.result || {};
  for (const c of cells) c.state = c.state === 'conflict' ? '' : c.state; // clear transient
  let act = tool;
  if (tool === 'read_range') {
    for (const c of cells) if (c.state === 'active') c.state = '';
    const rows = Array.isArray(res) ? res : [];
    for (const r of rows) {
      const c = byId[r.id];
      if (!c) continue;
      if (c.state !== 'locked') c.state = 'active'; // a read must not strip the lock badge
      c.version = r.version ?? c.version;
      if (r.value !== '' && r.value != null) c.value = r.value;
    }
    act = '<b>reads</b> ' + ids.slice(0,3).map(labelOf).join(', ') + (ids.length>3?' &hellip;':'') + ' &middot; sees version' + (rows[0] ? ' v'+rows[0].version : '');
    if (afterConflict) { afterConflict = false; snap('<b>re-reads</b> ' + ids.slice(0,2).map(labelOf).join(', ') + ' &middot; picks up the human\'s v' + (rows[0] ? rows[0].version : '?') + ' before retrying', 2000); continue; }
  } else if (tool === 'propose_lock') {
    const denied = res && (res.ok === false || res.granted === false || res.denied);
    for (const id of ids) if (byId[id]) byId[id].state = 'locked';
    if (denied) {
      deniedLocks += 1;
      act = deniedLocks === 1
        ? '<b>lock denied</b> &mdash; someone else holds the range'
        : '<b>still locked</b> &mdash; drafting the change for smart-merge instead';
    } else {
      act = '<b>locks</b> the affected range &middot; read-only for others';
    }
  } else if (tool === 'edit_cell' || tool === 'write_cell_result') {
    const id = (ev.args && ev.args.elementId) || ids[0];
    const v = ev.args && (ev.args.value && ev.args.value.value !== undefined ? ev.args.value.value : ev.args.value);
    if (res.conflict) {
      // Three-beat conflict sequence (gemini judge iterations): (1) the agent's write ATTEMPT,
      // value held in the status bar only — it never lands; (2) the human's commit ARRIVING,
      // value looked ahead from the agent's own later re-read (same trace, no invention);
      // (3) CAS rejecting the agent's stale write while the human's version is KEPT.
      const human = byId[id] ? lookAheadValue(ti + 1, id) : null;
      if (byId[id]) {
        byId[id].state = 'active';
        snap('<b>attempts write ' + labelOf(id) + '</b> &rarr; ' + (v != null ? String(v) : '') + ' &middot; based on v' + (res.expected != null ? res.expected : '?'), 1600);
        if (human && human.value != null) byId[id].value = String(human.value);
        if (res.actual != null) byId[id].version = res.actual;
        snap('<i>meanwhile</i> &mdash; a human commits ' + labelOf(id) + ' v' + (res.actual != null ? res.actual : '?') + (human && human.value != null ? ' &rarr; ' + human.value : ''), 2100);
        byId[id].state = 'conflict';
      }
      act = 'CAS <b>rejects the agent\'s stale write</b> &mdash; ' + labelOf(id) + ' keeps the human\'s v' + (res.actual != null ? res.actual : '?');
      afterConflict = true;
      snap(act, 2400);
      continue;
    }
    else if (res.locked) { if (byId[id]) byId[id].state = 'locked'; act = '<b>blocked</b> &mdash; range is locked; will draft instead'; }
    else if (res.ok) {
      wroteAny = true;
      const target = byId[id];
      if (target) { target.state = 'committed'; if (v != null) target.value = String(v); target.version = (target.version || 1) + 1; }
      else if (rest) { rest.state = 'committed'; rest.version += 1; const vs = v != null ? String(v) : ''; rest.value = id + ' ' + (vs.length > 22 ? vs.slice(0, 22) + '…' : vs); }
      act = '<b>writes ' + labelOf(id) + '</b> &rarr; ' + (v != null ? String(v) : '') + ' &middot; CAS, no clobber';
    }
    else { act = tool; }
  } else if (tool === 'create_draft') {
    const ops = (ev.args && ev.args.ops) || [];
    for (const op of ops) if (byId[op.elementId]) {
      byId[op.elementId].state = 'draft';
      if (op.value != null) byId[op.elementId].value = String(op.value);
    }
    wroteAny = true;
    act = '<b>drafts</b> the change for smart-merge on unlock';
  } else if (tool === 'release_lock' || tool === 'release') {
    // No dedicated frame: nothing changes visually (writes already cleared the badges), so a
    // "releases the lock" frame is dead air — fold it into the closing frame instead.
    for (const c of cells) if (c.state==='locked') c.state='';
    released = true;
    continue;
  } else if (tool === 'say') {
    act = '<b>notes</b> &middot; ' + String((ev.args && ev.args.message) || '').replace(/</g,'&lt;').slice(0, 70);
  } else if (tool === 'list_artifacts') {
    act = '<b>scans</b> the room artifacts';
  } else if (tool === 'search_sheet_context') {
    act = '<b>searches</b> the sheet for context';
  } else { act = tool; }
  snap(act);
}
snap(wroteAny
  ? '<b>done</b>' + (released ? ' &middot; lock released' : '') + ' &middot; every edit versioned, nothing overwritten'
  : '<b>done</b> &middot; value reported &middot; nothing was changed');

const el = id => document.getElementById(id);
el('ttl').textContent = WF.title; el('badge').textContent = WF.badge || ''; el('sub').textContent = WF.subtitle || '';
el('dots').innerHTML = frames.map(()=>'<div class="dot"></div>').join('');
if (cells.length > 6) el('sheet').classList.add('dense');
window.frameCount = () => frames.length;
window.frameHold = (i) => frames[Math.max(0,Math.min(i,frames.length-1))].hold ?? null;
window.showFrame = (i) => {
  const f = frames[Math.max(0,Math.min(i,frames.length-1))];
  el('sheet').innerHTML = f.cells.map(c =>
    `<div class="row ${c.state}"><div class="lab">${c.label}</div><div class="val">${c.value===''?'&mdash;':c.value}</div><div class="tag">${c.id==='__rest'?(c.version?c.version+' &check;':'&mdash;'):c.state==='locked'?'locked':c.state==='conflict'?'v'+c.version+' kept':c.state==='draft'?'draft':c.state==='committed'?'&check; v'+c.version:'v'+c.version}</div></div>`
  ).join('');
  el('act').innerHTML = f.act;
  el('stepn').textContent = i+'/'+(frames.length-1);
  const dots = el('dots').children; for (let k=0;k<dots.length;k++) dots[k].className = 'dot'+(k<=i?' on':'');
};
window.showFrame(0);
</script>
</body>
</html>
